<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário ECO</title>
<style>
:root {
	--color-primary: #1f7a3a;
	--color-background: #f6f8f7;
	--color-card-bg: #ffffff;
	--color-card-border: #e5e7eb;
	--color-text: #1f2937;
	--color-input-border: #d1d5db;
	--radius: 14px;
	--shadow: 0 15px 35px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
	--color-background: #0b1210;
	--color-card-bg: #0f1a15;
	--color-card-border: #1f2a24;
	--color-text: #ecfdf5;
	--color-input-border: #2d3a34;
}
body {
	font-family: Inter, sans-serif;
	display: flex;
	justify-content: center;
	padding: 60px 16px;
	color: var(--color-text);
	background: var(--color-background);
	margin: 0;
}
.background { position: fixed; inset: 0; background: var(--color-background); z-index: -1; overflow: hidden; }
.blob { position: absolute; width: 35px; height: 35px; background: rgba(31, 122, 58, 0.9); border-radius: 50%; filter: blur(2px); }
.card { background: var(--color-card-bg); border: 1px solid var(--color-card-border); border-radius: var(--radius); padding: 36px 32px; max-width: 600px; width: 100%; box-shadow: var(--shadow); box-sizing: border-box; position: relative; }
.logo { max-width: 180px; margin: 0 auto 20px; display: block; }
input, select { width: 100%; padding: 14px; margin-top: 14px; border-radius: 10px; border: 1px solid var(--color-input-border); box-sizing: border-box; }
.duo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 14px; }
.veiculo-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; margin-top: 14px; }
.veiculo-grid input { margin-top: 0; min-width: 0; box-sizing: border-box; }
button { width: 100%; height: 48px; margin-top: 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; }
.next { background: var(--color-primary); color: white; }
.next:hover { background: #165c2a; }
.theme-toggle { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--color-card-border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.success-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; opacity: 1; pointer-events: auto; transition: opacity 0.5s ease; z-index: 9999; }
.success-screen.hidden { opacity: 0; pointer-events: none; }
.success-card { background: var(--color-card-bg); padding: 30px; border-radius: 14px; text-align: center; box-shadow: var(--shadow); color: var(--color-text); z-index: 10000; }
.success-card button { margin-top: 20px; }
#resetFormButton { display: none; margin-top: 20px; }
.coberturas-section { margin-top: 14px; }
.coberturas-section select { width: 100%; }
.coberturas-badge { display: inline-block; background: #1f7a3a; color: white; padding: 4px 8px; border-radius: 8px; margin: 4px; cursor: pointer; }
input.valor-extra { margin: 4px 0 8px 0; width: calc(100% - 10px); }
.dias-reserva-container { display: flex; flex-wrap: wrap; margin-top: 4px; }
select.tipo-reserva { width: 150px; margin-right: 8px; }
input.dias-reserva { width: 80px; }
#simplesContainer, #simplesAssistenciasContainer { margin-bottom: 6px; }
#complexasContainer, #complexasAssistenciasContainer { margin-top: 4px; }
@media (max-width: 480px) { .duo, .veiculo-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="background" id="bg"></div>

<div id="successScreen" class="success-screen hidden">
	<div class="success-card">
		<h2>Enviado com sucesso ✅</h2>
		<button onclick="resetForm()">Preencher novamente</button>
	</div>
</div>

<div class="card">
	<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>
	<img src="https://i.imgur.com/O8Bayp2.png" class="logo" />
	<h3>Preencha os dados</h3>

	<select id="vendedor">
		<option value="" disabled selected>Selecione o vendedor</option>
		<option>Inaiá</option>
		<option>Nicolas</option>
		<option>Patrícia</option>
	</select>

	<select id="proposta">
		<option value="" disabled selected>Proposta comercial</option>
		<option>Allianz</option>
		<option>Yelum</option>
	</select>

	<div class="duo">
		<input id="segurado" placeholder="Nome do segurado">
		<input id="condutor2" placeholder="2° condutor (opcional)">
	</div>

	<div class="veiculo-grid">
		<input id="modelo" placeholder="Modelo do veículo">
		<input id="ano" placeholder="Ano" maxlength="4">
		<input id="placa" placeholder="Placa" maxlength="7">
	</div>

	<!-- Coberturas -->
	<div class="coberturas-section">
		<label for="coberturaSelect">Coberturas</label>
		<select id="coberturaSelect">
			<option value="" disabled selected>Escolha uma cobertura</option>
			<option value="Roubo/Furto">Roubo/Furto</option>
			<option value="PT">PT</option>
			<option value="Compreensiva">Compreensiva</option>
			<option value="Danos Morais">Danos Morais</option>
			<option value="Danos Materiais">Danos Materiais</option>
			<option value="Danos Corporais">Danos Corporais</option>
			<option value="Custo de Defesa">Custo de Defesa</option>
			<option value="Despesa Extraordinária">Despesa Extraordinária</option>
			<option value="Carro Reserva">Carro Reserva</option>
		</select>
		<div id="coberturasSelecionadas">
			<div id="simplesContainer"></div>
			<div id="complexasContainer"></div>
		</div>
	</div>

	<!-- Assistências -->
	<div class="coberturas-section">
		<label for="assistenciaSelect">Assistências</label>
		<select id="assistenciaSelect">
			<option value="" disabled selected>Escolha uma assistência</option>
			<option value="Martelinho de ouro">Martelinho de ouro</option>
			<option value="Pequenos Reparos">Pequenos Reparos</option>
			<option value="Parachoque/Pintura">Parachoque/Pintura</option>
			<option value="Assistencia 24h">Assistência 24h</option>
			<option value="Assistencia de Vidros">Assistência de Vidros</option>
		</select>
		<div id="assistenciasSelecionadas">
			<div id="simplesAssistenciasContainer"></div>
			<div id="complexasAssistenciasContainer"></div>
		</div>
	</div>

	<button class="next" onclick="enviarFormulario()">Enviar</button>
	<button id="resetFormButton" class="next" onclick="resetForm()">Preencher novamente</button>
</div>

<script>
// Toggle tema
function toggleTheme() {
	const current = document.documentElement.getAttribute("data-theme");
	const themeBtn = document.getElementById("themeBtn");
	if(current==="dark"){document.documentElement.setAttribute("data-theme","light"); themeBtn.textContent="🌞";}
	else{document.documentElement.setAttribute("data-theme","dark"); themeBtn.textContent="🌙";}
}
window.onload = () => {
	const theme = document.documentElement.getAttribute("data-theme")||"light";
	document.getElementById("themeBtn").textContent = theme==="dark"?"🌙":"🌞";
};

// BLOBS
const bg = document.getElementById("bg");
const blobs=[];
for(let i=0;i<400;i++){
	const blob=document.createElement("div");
	blob.className="blob";
	const x=Math.random()*window.innerWidth;
	const y=Math.random()*window.innerHeight;
	blob.style.left=x+"px";
	blob.style.top=y+"px";
	blob.dataset.ox=x;
	blob.dataset.oy=y;
	bg.appendChild(blob);
	blobs.push(blob);
}
document.addEventListener("mousemove",e=>{
	const mx=e.clientX;
	const my=e.clientY;
	blobs.forEach(blob=>{
		const ox=parseFloat(blob.dataset.ox);
		const oy=parseFloat(blob.dataset.oy);
		const dx=mx-ox;
		const dy=my-oy;
		const dist=Math.sqrt(dx*dx+dy*dy);
		const maxDist=150;
		if(dist<maxDist){
			const force=(maxDist-dist)/maxDist*30;
			const angle=Math.atan2(dy,dx);
			blob.style.transform=`translate(${-Math.cos(angle)*force}px, ${-Math.sin(angle)*force}px)`;
		}else{
			blob.style.transform="translate(0,0)";
		}
	});
});

// Validações
document.getElementById("placa").addEventListener("input",function(){this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,7);});
document.getElementById("ano").addEventListener("input",function(){this.value=this.value.replace(/[^0-9]/g,'').slice(0,4);});

// --- Coberturas ---
const selectCobertura=document.getElementById("coberturaSelect");
const divSelecionadas=document.getElementById("coberturasSelecionadas");
const simplesContainer=document.getElementById("simplesContainer");
const complexasContainer=document.getElementById("complexasContainer");
const coberturasEscolhidas=new Set();

const coberturasSimples=["Roubo/Furto","PT","Compreensiva"];
const coberturasComplexas=["Danos Morais","Danos Materiais","Danos Corporais","Custo de Defesa","Despesa Extraordinária"];
const coberturaCarroReserva="Carro Reserva";

// Máscara reais
function mascaraReaisInteligente(event){
	const input=event.target;
	let valor=input.value.replace(/\D/g,"");
	if(valor===""){input.value="";return;}
	valor=(parseInt(valor,10)/100).toFixed(2);
	valor=valor.replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
	input.value="R$ "+valor;
}

// Adicionar cobertura
function adicionarCobertura(v){
	if(coberturasEscolhidas.has(v)) return;
	coberturasEscolhidas.add(v);

	const badge=document.createElement("span");
	badge.textContent=v+" ✖";
	badge.className="coberturas-badge";
	badge.dataset.valor=v;

	if(coberturasSimples.includes(v)) simplesContainer.appendChild(badge);
	else complexasContainer.appendChild(badge);

	if(coberturasComplexas.includes(v) && v!==coberturaCarroReserva){
		const inputExtra=document.createElement("input");
		inputExtra.placeholder="Valor em R$";
		inputExtra.dataset.cobertura=v;
		inputExtra.className="valor-extra";
		inputExtra.addEventListener("input",mascaraReaisInteligente);
		complexasContainer.appendChild(inputExtra);
	}

	if(v===coberturaCarroReserva){
		const container=document.createElement("div");
		container.className="dias-reserva-container";
		container.dataset.cobertura=v;
		const selectExtra=document.createElement("select");
		selectExtra.className="tipo-reserva";
		selectExtra.dataset.cobertura=v;
		selectExtra.innerHTML=`<option value="" disabled selected>Tipo</option>
			<option value="Basico">Básico</option>
			<option value="Medio">Médio</option>
			<option value="Executivo">Executivo</option>`;
		const inputDias=document.createElement("input");
		inputDias.type = "number";
		inputDias.placeholder="Dias";
		inputDias.className="dias-reserva";
		inputDias.dataset.cobertura=v;
		container.appendChild(selectExtra);
		container.appendChild(inputDias);
		complexasContainer.appendChild(container);
	}

	badge.addEventListener("click",()=>{ removerCobertura(v);
		if(v==="Danos Corporais" && coberturasEscolhidas.has("Danos Materiais")) removerCobertura("Danos Materiais");
		if(v==="Danos Materiais" && coberturasEscolhidas.has("Danos Corporais")) removerCobertura("Danos Corporais");
	});
}

// Remover cobertura
function removerCobertura(v){
	coberturasEscolhidas.delete(v);
	const badge=document.querySelector(`.coberturas-badge[data-valor="${v}"]`);
	if(badge) badge.parentElement.removeChild(badge);
	const extras=document.querySelectorAll(`[data-cobertura="${v}"]`);
	extras.forEach(el=>el.parentElement.removeChild(el));
}

selectCobertura.addEventListener("change",()=>{
	const valor=selectCobertura.value;
	if(!valor || coberturasEscolhidas.has(valor)) return;
	adicionarCobertura(valor);
	if(valor==="Danos Corporais") adicionarCobertura("Danos Materiais");
	if(valor==="Danos Materiais") adicionarCobertura("Danos Corporais");
	selectCobertura.value="";
});

// --- Assistências ---
const selectAssistencia = document.getElementById("assistenciaSelect");
const simplesAssistenciasContainer = document.getElementById("simplesAssistenciasContainer");
const complexasAssistenciasContainer = document.getElementById("complexasAssistenciasContainer");
const assistenciasEscolhidas = new Set();

const assistenciasSimples = ["Martelinho de ouro","Pequenos Reparos","Parachoque/Pintura"];
const assistenciasComplexas = ["Assistencia 24h","Assistencia de Vidros"];

function adicionarAssistencia(v){
	if(assistenciasEscolhidas.has(v)) return;
	assistenciasEscolhidas.add(v);

	const badge = document.createElement("span");
	badge.textContent = v+" ✖";
	badge.className="coberturas-badge";
	badge.dataset.valor=v;

	if(assistenciasSimples.includes(v)) simplesAssistenciasContainer.appendChild(badge);
	else complexasAssistenciasContainer.appendChild(badge);

	if(v === "Assistencia 24h" || v === "Assistencia de Vidros"){
		const container = document.createElement("div");
		container.dataset.cobertura = v;

		const selectNivel = document.createElement("select");
		selectNivel.dataset.cobertura = v;
		selectNivel.innerHTML = `<option value="" disabled selected>Nível</option>
			<option value="Basico">Básico</option>
			<option value="Completo">Completo</option>`;
		container.appendChild(selectNivel);


		selectNivel.addEventListener("change", ()=> {
			if(selectNivel.value === "Completo"){
				inputDetalhe.value = v === "Assistencia 24h" ? "Ilimitado" : "Completa";
				inputDetalhe.readOnly = true;
			} else { 
				inputDetalhe.value = "";
				inputDetalhe.placeholder = v === "Assistencia 24h" ? "Distância Máxima" : "Detalhes";
				inputDetalhe.readOnly = false;
			}
		});

		complexasAssistenciasContainer.appendChild(container);
	}

	badge.addEventListener("click", ()=>{ removerAssistencia(v); });
}

function removerAssistencia(v){
	assistenciasEscolhidas.delete(v);
	const badge = document.querySelector(`#assistenciasSelecionadas .coberturas-badge[data-valor="${v}"]`);
	if(badge) badge.parentElement.removeChild(badge);
	const extras = document.querySelectorAll(`#assistenciasSelecionadas [data-cobertura="${v}"]`);
	extras.forEach(el=>el.parentElement.removeChild(el));
}

selectAssistencia.addEventListener("change", ()=>{
	const valor = selectAssistencia.value;
	if(!valor || assistenciasEscolhidas.has(valor)) return;
	adicionarAssistencia(valor);
	selectAssistencia.value="";
});

// ENVIO
async function enviarFormulario(){
	const vendedor=document.getElementById("vendedor").value;
	const proposta=document.getElementById("proposta").value;
	const segurado=document.getElementById("segurado").value;
	const condutor2=document.getElementById("condutor2").value;
	const modelo=document.getElementById("modelo").value;
	const ano=document.getElementById("ano").value;
	const placa=document.getElementById("placa").value;

	if(!vendedor || !proposta || !segurado || !modelo || !ano || !placa){
		alert("Preencha todos os campos obrigatórios.");
		return;
	}

	const data = {
		vendedor, proposta, segurado, condutor2, modelo, ano, placa,
		coberturas: Array.from(coberturasEscolhidas),
		assistencias: Array.from(assistenciasEscolhidas)
	};

	console.log("Dados enviados:", data);

	document.getElementById("successScreen").classList.remove("hidden");
	document.getElementById("resetFormButton").style.display="block";
}

function resetForm(){
	location.reload();
}
</script>
</body>
</html>
