<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário ECO</title>

<style>
:root {
	--color-primary: #1f7a3a;
	--color-background: #f6f8f7;
	--color-card-bg: #ffffff;
	--color-card-border: #e5e7eb;
	--color-text: #1f2937;

	--radius: 14px;
	--shadow: 0 15px 35px rgba(0,0,0,0.08);
}

[data-theme="dark"] {
	--color-background: #0b1210;
	--color-card-bg: #0f1a15;
	--color-card-border: #1f2a24;
	--color-text: #ecfdf5;
}

body {
	font-family: Inter, sans-serif;
	display: flex;
	justify-content: center;
	padding: 60px 16px;
	background: var(--color-background);
	color: var(--color-text);
}

.card {
	background: var(--color-card-bg);
	border: 1px solid var(--color-card-border);
	border-radius: var(--radius);
	padding: 32px;
	width: 100%;
	max-width: 400px;
	box-shadow: var(--shadow);
	position: relative;
}

select {
	width: 100%;
	padding: 14px;
	margin-top: 16px;
	border-radius: 10px;
	border: 1px solid var(--color-card-border);
	background: transparent;
	color: var(--color-text);
}

button {
	width: 100%;
	height: 46px;
	margin-top: 20px;
	border-radius: 10px;
	border: none;
	cursor: pointer;
	font-weight: 600;
	background: var(--color-primary);
	color: white;
}

.theme-toggle {
	position: absolute;
	top: 16px;
	right: 16px;
	background: transparent;
	border: 1px solid var(--color-card-border);
	border-radius: 999px;
	padding: 8px;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
}

[data-theme="dark"] .theme-toggle {
	background: rgba(255,255,255,0.05);
	color: #facc15;
}
</style>
</head>

<body>

<div class="card">
	<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"></button>

	<h3>Selecionar vendedor</h3>

	<select id="vendedor">
		<option value="">Selecione</option>
		<option value="Inaia">Inaiá</option>
		<option value="Nicolas">Nicolas</option>
		<option value="Patricia">Patrícia</option>
	</select>

	<button onclick="enviarFormulario()">Enviar</button>
</div>

<script>
/* ICONES */
const moonIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none">
<path d="M21 12.79A9 9 0 0 1 11.21 3 
7 7 0 1 0 21 12.79Z"
stroke="currentColor" stroke-width="2"/>
</svg>`;

const sunIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none">
<circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
<line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2"/>
<line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2"/>
</svg>`;

/* DARK MODE */
function toggleTheme() {
	const current = document.documentElement.getAttribute("data-theme");
	const newTheme = current === "dark" ? "light" : "dark";

	document.documentElement.setAttribute("data-theme", newTheme);
	localStorage.setItem("theme", newTheme);
	updateIcon();
}

function updateIcon() {
	const theme = document.documentElement.getAttribute("data-theme");
	document.getElementById("themeBtn").innerHTML =
		theme === "dark" ? sunIcon : moonIcon;
}

(function () {
	const saved = localStorage.getItem("theme") || "light";
	document.documentElement.setAttribute("data-theme", saved);
	updateIcon();
})();

/* ENVIO PARA N8N */
async function enviarFormulario() {
	const vendedor = document.getElementById("vendedor").value;

	if (!vendedor) {
		alert("Selecione um vendedor");
		return;
	}

	try {
		await fetch("https://projeto1-n8n.khyklu.easypanel.host/webhook-test/db0338f3-a387-4a7a-8981-c17c540ed3ea", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({ vendedor })
		});

		alert("Enviado com sucesso!");
	} catch (err) {
		alert("Erro ao enviar");
	}
}
</script>

</body>
</html>
