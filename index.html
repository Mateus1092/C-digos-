<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário ECO</title>

<style>
/* ===================== */
/* VARIÁVEIS (CORES/TEMA) */
/* ===================== */
:root {
	--color-primary: #1f7a3a;
	--color-background: #f6f8f7;
	--color-card-bg: #ffffff;
	--color-card-border: #e5e7eb;
	--color-text: #1f2937;
	--color-input-border: #d1d5db;

	--radius: 14px;
	--shadow: 0 15px 35px rgba(0,0,0,0.08);
}

/* TEMA DARK */
[data-theme="dark"] {
	--color-background: #0b1210;
	--color-card-bg: #0f1a15;
	--color-card-border: #1f2a24;
	--color-text: #ecfdf5;
	--color-input-border: #2d3a34;
}

/* ===================== */
/* FUNDO + BLOBS */
/* ===================== */
.background {
	position: fixed;
	inset: 0;
	background: var(--color-background);
	z-index: -1;
	overflow: hidden;
}

.blob {
	position: absolute;
	width: 35px;
	height: 35px;
	background: rgba(31, 122, 58, 0.9);
	border-radius: 50%;
	filter: blur(2px);
}

/* ===================== */
/* BASE */
body {
	font-family: Inter, sans-serif;
	display: flex;
	justify-content: center;
	padding: 60px 16px;
	color: var(--color-text);
	background: var(--color-background);
	margin: 0;
}

/* CARD PRINCIPAL */
.card {
	background: var(--color-card-bg);
	border: 1px solid var(--color-card-border);
	border-radius: var(--radius);
	padding: 36px 32px;
	max-width: 600px;
	width: 100%;
	box-shadow: var(--shadow);
	box-sizing: border-box;
	position: relative;
}

/* LOGO */
.logo {
	max-width: 180px;
	margin: 0 auto 20px;
	display: block;
}

/* INPUT PADRÃO */
input, select {
	width: 100%;
	padding: 14px;
	margin-top: 14px;
	border-radius: 10px;
	border: 1px solid var(--color-input-border);
	box-sizing: border-box;
}

/* SEGURADO + CONDUTOR */
.duo {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 16px;
	margin-top: 14px;
}

/* VEÍCULO */
.veiculo-grid {
	display: grid;
	grid-template-columns: 2fr 1fr 1fr;
	gap: 12px;
	margin-top: 14px;
}

.veiculo-grid input {
	margin-top: 0;
	min-width: 0;
	box-sizing: border-box;
}

/* BOTÕES */
button {
	width: 100%;
	height: 48px;
	margin-top: 24px;
	border-radius: 10px;
	border: none;
	cursor: pointer;
	font-weight: 600;
	transition: background 0.2s;
}

.next {
	background: var(--color-primary);
	color: white;
}

.next:hover {
	background: #165c2a;
}

/* TOGGLE TEMA */
.theme-toggle {
	position: absolute;
	top: 16px;
	right: 16px;
	width: 36px;
	height: 36px;
	border-radius: 50%;
	border: 1px solid var(--color-card-border);
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	font-size: 18px;
}

/* TELA DE SUCESSO */
.success-screen {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.35);
	display: flex;
	align-items: center;
	justify-content: center;
}

.success-card {
	background: var(--color-card-bg);
	padding: 30px;
	border-radius: 14px;
	text-align: center;
	box-shadow: var(--shadow);
	color: var(--color-text);
}

.hidden {
	display: none;
}

/* RESPONSIVO */
@media (max-width: 480px) {
	.duo, .veiculo-grid {
		grid-template-columns: 1fr;
	}
}
</style>
</head>
<body>

<!-- FUNDO -->
<div class="background" id="bg"></div>

<!-- TELA DE SUCESSO -->
<div id="successScreen" class="success-screen hidden">
	<div class="success-card">
		<h2>Enviado com sucesso ✅</h2>
		<button onclick="resetForm()">Preencher novamente</button>
	</div>
</div>

<!-- CARD PRINCIPAL -->
<div class="card">

	<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>

	<img src="https://i.imgur.com/O8Bayp2.png" class="logo" />

	<h3>Preencha os dados</h3>

	<!-- VENDEDOR -->
	<select id="vendedor">
		<option value="" disabled selected>Selecione o vendedor</option>
		<option>Inaiá</option>
		<option>Nicolas</option>
		<option>Patrícia</option>
	</select>

	<!-- PROPOSTA -->
	<select id="proposta">
		<option value="" disabled selected>Proposta comercial</option>
		<option>Allianz</option>
		<option>Yelum</option>
	</select>

	<!-- SEGURADO + CONDUTOR -->
	<div class="duo">
		<input id="segurado" placeholder="Nome do segurado">
		<input id="condutor2" placeholder="2° condutor (opcional)">
	</div>

	<!-- VEÍCULO -->
	<div class="veiculo-grid">
		<input id="modelo" placeholder="Modelo do veículo">
		<input id="ano" placeholder="Ano" maxlength="4">
		<input id="placa" placeholder="Placa" maxlength="7">
	</div>

	<button class="next" onclick="enviarFormulario()">Enviar</button>

</div>

<script>
// =====================
// TEMA (LIGHT/DARK) com ícones
function toggleTheme() {
	const current = document.documentElement.getAttribute("data-theme");
	const themeBtn = document.getElementById("themeBtn");
	if (current === "dark") {
		document.documentElement.setAttribute("data-theme", "light");
		themeBtn.textContent = "🌞";
	} else {
		document.documentElement.setAttribute("data-theme", "dark");
		themeBtn.textContent = "🌙";
	}
}

// Inicializa ícone do tema
window.onload = () => {
	const theme = document.documentElement.getAttribute("data-theme") || "light";
	document.getElementById("themeBtn").textContent = theme === "dark" ? "🌙" : "🌞";
};

// BLOBS ANIMADOS
const bg = document.getElementById("bg");
for (let i = 0; i < 100; i++) {
	const blob = document.createElement("div");
	blob.className = "blob";
	blob.style.top = Math.random() * 100 + "%";
	blob.style.left = Math.random() * 100 + "%";
	bg.appendChild(blob);
}

// VALIDAÇÕES
document.getElementById("placa").addEventListener("input", function(){
	this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,7);
});

document.getElementById("ano").addEventListener("input", function(){
	this.value = this.value.replace(/[^0-9]/g,'').slice(0,4);
});

// =====================
// ENVIO PARA N8N
async function enviarFormulario() {
	const vendedor = document.getElementById("vendedor").value;
	const proposta = document.getElementById("proposta").value;
	const segurado = document.getElementById("segurado").value;
	const condutor2 = document.getElementById("condutor2").value;
	const modelo = document.getElementById("modelo").value;
	const ano = document.getElementById("ano").value;
	const placa = document.getElementById("placa").value;

	if (!vendedor || !proposta || !segurado || !modelo || !ano || !placa) {
		alert("Preencha todos os campos obrigatórios");
		return;
	}

	const dadosFormulario = {
		vendedor,
		proposta,
		segurado,
		condutor2,
		modelo,
		ano,
		placa
	};

	try {
		const response = await fetch("https://projeto1-n8n.khyklu.easypanel.host/webhook-test/db0338f3-a387-4a7a-8981-c17c540ed3ea", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify(dadosFormulario)
		});

		if (!response.ok) {
			throw new Error("Erro ao enviar os dados");
		}

		// Mostrar tela de sucesso
		document.getElementById("successScreen").classList.remove("hidden");

	} catch (error) {
		alert("Falha ao enviar o formulário: " + error.message);
	}
}

// RESET FORMULÁRIO
function resetForm() {
	document.querySelectorAll("input, select").forEach(el => el.value = "");
	document.getElementById("successScreen").classList.add("hidden");
}
</script>

</body>
</html>
