<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário ECO</title>

<style>
:root {
	--color-primary: #1f7a3a;
	--color-background: #f6f8f7;
	--color-card-bg: #ffffff;
	--color-card-border: #e5e7eb;
	--color-text: #1f2937;
	--color-input-border: #d1d5db;
	--radius: 14px;
	--shadow: 0 15px 35px rgba(0,0,0,0.08);
}

[data-theme="dark"] {
	--color-background: #0b1210;
	--color-card-bg: #0f1a15;
	--color-card-border: #1f2a24;
	--color-text: #ecfdf5;
	--color-input-border: #2d3a34;
}

body {
	font-family: Inter, sans-serif;
	display: flex;
	justify-content: center;
	padding: 60px 16px;
	color: var(--color-text);
	background: var(--color-background);
	margin: 0;
}

.background {
	position: fixed;
	inset: 0;
	background: var(--color-background);
	z-index: -1;
	overflow: hidden;
}

.blob {
	position: absolute;
	width: 35px;
	height: 35px;
	background: rgba(31, 122, 58, 0.9);
	border-radius: 50%;
	filter: blur(2px);
}

.card {
	background: var(--color-card-bg);
	border: 1px solid var(--color-card-border);
	border-radius: var(--radius);
	padding: 36px 32px;
	max-width: 600px;
	width: 100%;
	box-shadow: var(--shadow);
	box-sizing: border-box;
	position: relative;
}

.logo {
	max-width: 180px;
	margin: 0 auto 20px;
	display: block;
}

input, select {
	width: 100%;
	padding: 14px;
	margin-top: 14px;
	border-radius: 10px;
	border: 1px solid var(--color-input-border);
	box-sizing: border-box;
}

.duo {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 16px;
	margin-top: 14px;
}

.veiculo-grid {
	display: grid;
	grid-template-columns: 2fr 1fr 1fr;
	gap: 12px;
	margin-top: 14px;
}

.veiculo-grid input {
	margin-top: 0;
	min-width: 0;
	box-sizing: border-box;
}

button {
	width: 100%;
	height: 48px;
	margin-top: 24px;
	border-radius: 10px;
	border: none;
	cursor: pointer;
	font-weight: 600;
	transition: background 0.2s;
}

.next {
	background: var(--color-primary);
	color: white;
}
.next:hover { background: #165c2a; }

.theme-toggle {
	position: absolute;
	top: 16px;
	right: 16px;
	width: 36px;
	height: 36px;
	border-radius: 50%;
	border: 1px solid var(--color-card-border);
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	font-size: 18px;
}

/* Tela de sucesso com fade out */
.success-screen {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.35);
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 1;
	pointer-events: auto;
	transition: opacity 0.5s ease;
	z-index: 9999;
}

.success-screen.hidden {
	opacity: 0;
	pointer-events: none;
}

.success-card {
	background: var(--color-card-bg);
	padding: 30px;
	border-radius: 14px;
	text-align: center;
	box-shadow: var(--shadow);
	color: var(--color-text);
	z-index: 10000;
}

.success-card button { margin-top: 20px; }

/* Botão extra no formulário após fade */
#resetFormButton {
	display: none;
	margin-top: 20px;
}

/* Coberturas */
.coberturas-section {
	margin-top: 14px;
}
.coberturas-section select {
	width: 100%;
}
.coberturas-badge {
	display: inline-block;
	background: #1f7a3a;
	color: white;
	padding: 4px 8px;
	border-radius: 8px;
	margin: 4px;
	cursor: pointer;
}

@media (max-width: 480px) {
	.duo, .veiculo-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="background" id="bg"></div>

<!-- TELA DE SUCESSO -->
<div id="successScreen" class="success-screen hidden">
	<div class="success-card">
		<h2>Enviado com sucesso ✅</h2>
		<button onclick="resetForm()">Preencher novamente</button>
	</div>
</div>

<div class="card">
	<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>
	<img src="https://i.imgur.com/O8Bayp2.png" class="logo" />
	<h3>Preencha os dados</h3>

	<select id="vendedor">
		<option value="" disabled selected>Selecione o vendedor</option>
		<option>Inaiá</option>
		<option>Nicolas</option>
		<option>Patrícia</option>
	</select>

	<select id="proposta">
		<option value="" disabled selected>Proposta comercial</option>
		<option>Allianz</option>
		<option>Yelum</option>
	</select>

	<div class="duo">
		<input id="segurado" placeholder="Nome do segurado">
		<input id="condutor2" placeholder="2° condutor (opcional)">
	</div>

	<div class="veiculo-grid">
		<input id="modelo" placeholder="Modelo do veículo">
		<input id="ano" placeholder="Ano" maxlength="4">
		<input id="placa" placeholder="Placa" maxlength="7">
	</div>

	<!-- Coberturas -->
	<div class="coberturas-section">
		<label for="coberturaSelect">Coberturas</label>
		<select id="coberturaSelect">
			<option value="" disabled selected>Escolha uma cobertura</option>
			<option value="Roubo">Roubo</option>
			<option value="Incêndio">Incêndio</option>
			<option value="Vidros">Vidros</option>
			<option value="Acidentes">Acidentes</option>
			<option value="Terceiros">Terceiros</option>
		</select>
		<div id="coberturasSelecionadas" style="margin-top: 12px;"></div>
	</div>

	<button class="next" onclick="enviarFormulario()">Enviar</button>
	<button id="resetFormButton" class="next" onclick="resetForm()">Preencher novamente</button>
</div>

<script>
function toggleTheme() {
	const current = document.documentElement.getAttribute("data-theme");
	const themeBtn = document.getElementById("themeBtn");
	if (current === "dark") {
		document.documentElement.setAttribute("data-theme", "light");
		themeBtn.textContent = "🌞";
	} else {
		document.documentElement.setAttribute("data-theme", "dark");
		themeBtn.textContent = "🌙";
	}
}
window.onload = () => {
	const theme = document.documentElement.getAttribute("data-theme") || "light";
	document.getElementById("themeBtn").textContent = theme === "dark" ? "🌙" : "🌞";
};

// BLOBS
const bg = document.getElementById("bg");
for (let i = 0; i < 100; i++) {
	const blob = document.createElement("div");
	blob.className = "blob";
	blob.style.top = Math.random() * 100 + "%";
	blob.style.left = Math.random() * 100 + "%";
	bg.appendChild(blob);
}

// VALIDAÇÕES
document.getElementById("placa").addEventListener("input", function(){
	this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,7);
});
document.getElementById("ano").addEventListener("input", function(){
	this.value = this.value.replace(/[^0-9]/g,'').slice(0,4);
});

// Coberturas
const selectCobertura = document.getElementById("coberturaSelect");
const divSelecionadas = document.getElementById("coberturasSelecionadas");
const coberturasEscolhidas = new Set();

selectCobertura.addEventListener("change", () => {
	const valor = selectCobertura.value;
	if (!valor || coberturasEscolhidas.has(valor)) return;

	coberturasEscolhidas.add(valor);

	const badge = document.createElement("span");
	badge.textContent = valor + " ✖";
	badge.className = "coberturas-badge";
	badge.dataset.valor = valor;

	badge.addEventListener("click", () => {
		coberturasEscolhidas.delete(valor);
		divSelecionadas.removeChild(badge);
	});

	divSelecionadas.appendChild(badge);
	selectCobertura.value = "";
});

// ENVIO PARA N8N
const successScreen = document.getElementById("successScreen");
const resetFormButton = document.getElementById("resetFormButton");

async function enviarFormulario() {
	const vendedor = document.getElementById("vendedor").value;
	const proposta = document.getElementById("proposta").value;
	const segurado = document.getElementById("segurado").value;
	const condutor2 = document.getElementById("condutor2").value;
	const modelo = document.getElementById("modelo").value;
	const ano = document.getElementById("ano").value;
	const placa = document.getElementById("placa").value;
	const coberturasArray = Array.from(coberturasEscolhidas);

	if (!vendedor || !proposta || !segurado || !modelo || !ano || !placa) {
		alert("Preencha todos os campos obrigatórios");
		return;
	}

	const dadosFormulario = { vendedor, proposta, segurado, condutor2, modelo, ano, placa, coberturas: coberturasArray };

	try {
		const response = await fetch("https://projeto1-n8n.khyklu.easypanel.host/webhook-test/db0338f3-a387-4a7a-8981-c17c540ed3ea", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify(dadosFormulario)
		});
		if (!response.ok) throw new Error("Erro ao enviar os dados");

		successScreen.classList.remove("hidden");
		resetFormButton.style.display = "none";

		setTimeout(() => {
			successScreen.classList.add("hidden");
			resetFormButton.style.display = "block";
		}, 5000);

	} catch (error) {
		alert("Falha ao enviar o formulário: " + error.message);
	}
}

function resetForm() {
	document.querySelectorAll("input, select").forEach(el => el.value = "");
	coberturasEscolhidas.clear();
	divSelecionadas.innerHTML = "";
	successScreen.classList.add("hidden");
	resetFormButton.style.display = "none";
}
</script>

</body>
</html>
