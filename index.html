<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formulário ECO</title>

  <style>
    :root{
      --color-primary:#1f7a3a;
      --bg:#f6f8f7;
      --card-bg:#fff;
      --card-border:#e5e7eb;
      --text:#1f2937;
      --input-border:#d1d5db;
      --ghost-color:#ef4444;
      --ghost-text:#ffffff;
      --radius:14px;
      --shadow:0 15px 35px rgba(0,0,0,0.08);
      --touch-size:48px;
    }
    [data-theme="dark"]{
      --bg:#0b1210;
      --card-bg:#0f1a15;
      --card-border:#1f2a24;
      --text:#ecfdf5;
      --input-border:#2d3a34;
      --input-bg:#111a16;
      --ghost-color:#ef4444;
      --ghost-text:#ffffff;
    }

    input[type="text"], input[type="date"], input[type="number"], select, button {
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid var(--input-border);
      box-sizing:border-box;
      margin-top:8px;
      font-size:1rem;
      background-color: var(--input-bg, #fff);
      color: var(--text);
    }
    textarea {
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid var(--input-border);
      box-sizing:border-box;
      margin-top:8px;
      font-size:1rem;
      min-height:96px;
      resize:vertical;
      font-family:inherit;
      background-color: var(--input-bg, #fff);
      color: var(--text);
    }

    input[type="date"] {
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid var(--input-border);
      box-sizing:border-box;
      margin-top:8px;
      font-size:1rem;
      background-color: var(--input-bg, #fff);
      color: var(--text);
    }

    [data-theme="dark"] input[type="date"] {
      color: #ecfdf5;
    }
    
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(1.2);
      cursor: pointer;
    }

    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;color:var(--text);background:var(--bg);}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 12px;box-sizing:border-box;}
    .card{width:100%;max-width:920px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:relative;box-sizing:border-box;z-index:2;}

    .logo{display:block;margin:0 auto 2px;max-width:350px;}
    h1{font-size:1.1rem;margin:0 0 12px;text-align:center;}
    label{display:block;margin-top:12px;font-weight:600;font-size:0.95rem;}
    button { min-height: var(--touch-size); display:inline-flex; align-items:center; justify-content:center; gap:8px; }

    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;}
    .actions{margin-top:18px;display:flex;flex-direction:row;gap:12px;align-items:center;}
    button.primary{flex:1;background:var(--color-primary);color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;}
    button.ghost{
      background: var(--ghost-color);
      border: 1px solid var(--ghost-color);
      color: var(--ghost-text);
      padding:12px;border-radius:10px;cursor:pointer;font-weight:700;
      transition: transform .08s ease, box-shadow .12s ease;
    }
    button.ghost:active{ transform: translateY(1px); }
    button.ghost:focus{ outline: 3px solid rgba(239,68,68,0.18); outline-offset:2px; }

    .actions .primary { flex: 1 1 auto; min-width: 0; }
    .actions .ghost { flex: 0 0 160px; max-width: 160px; padding: 10px 12px; font-size: 0.95rem; }

    .badges{margin-top:8px;}
    .badge{display:inline-block;background:var(--color-primary);color:#fff;padding:10px 16px;border-radius:999px;margin:6px 6px 6px 0;cursor:pointer;font-size:1rem;line-height:1.2;white-space:nowrap;}
    .small{font-size:0.85rem;}

    .cobertura-item, .assistencia-item {
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:6px;
      flex-wrap:wrap;
    }
    .cobertura-item .badge, .assistencia-item .badge { margin:0; }
    .cobertura-item input, .assistencia-item input, .cobertura-item select { margin:0; }

    #simplesContainer, #simplesAssistenciasContainer {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    #complexasContainer, #complexasAssistenciasContainer {
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    #vidrosSelecionados {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-top:6px;
    }
    #vidrosSelecionados .badge { margin:0; }

    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);z-index:9999;visibility:hidden;opacity:0;transition:opacity .25s,visibility .25s;}
    .overlay.show{visibility:visible;opacity:1;}
    .overlay .card{max-width:420px;text-align:center;z-index:10000;}

    .background { position: fixed; inset: 0; background: transparent; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; width: 30px; height: 30px; background: rgba(31,122,58,0.9); border-radius: 50%; filter: blur(2px); pointer-events: none; transition: transform 0.12s linear; will-change: transform; z-index: 0; mix-blend-mode: screen; opacity:0.95; }

    #parcelasValoresContainer{
      margin-top:12px;
      padding:12px;
      background-color:var(--card-border);
      border-radius:8px;
    }
    #parcelasValoresContainer label{
      font-weight:700;
      display:block;
      margin-bottom:8px;
      margin-top:0;
    }
    .parcela-input-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }
    .parcela-input-row label{
      min-width:80px;
      font-weight:500;
      margin-top:0;
    }
    .parcela-input-row input{
      flex:1;
      margin-top:0;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--card-border);
      border-top: 4px solid var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 720px) {
      .card{padding:18px;border-radius:12px;}
      .grid-2{grid-template-columns:1fr;gap:10px;}
      .grid-3{grid-template-columns:1fr;gap:10px;}
      .badge{padding:10px 14px;font-size:1rem;}
      .cobertura-item, .assistencia-item { gap:10px; }
      .actions{flex-direction:column;}
      .actions .primary { width:100%; order:1; }
      .actions .ghost { width:48%; max-width:none; align-self:flex-end; order:2; flex:0 0 auto; }
      .logo{max-width:140px;}
      h1{font-size:1rem;}
    }

    @media (pointer: coarse) {
      .blob { filter: blur(1.5px); opacity:0.9; }
    }
  </style>
</head>
<body>

  <div class="background" id="bg"></div>

  <div class="wrap">
    <div class="card" id="appCard" data-theme="light">
      <button id="themeToggle" title="Alternar tema" style="position:absolute;right:12px;top:12px;border-radius:50%;width:40px;height:40px;border:1px solid var(--card-border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;"></button>

      <img class="logo" src="https://i.imgur.com/O8Bayp2.png" alt="Logo" />
      <h1>Preencha os dados</h1>

      <form id="mainForm" novalidate>
        <label for="vendedor">Vendedor</label>
        <select id="vendedor" name="vendedor" required>
          <option value="" disabled selected>Selecione o vendedor</option>
          <option>Alexandre</option>
          <option>Celso</option>
          <option>Diego</option>
          <option>Fabio</option>
          <option>Felipe</option>
          <option>Fernanda</option>
          <option>Inaiá</option>
          <option>Luiz Felipe</option>
          <option>Mariana</option>
          <option>Nikolas</option>
          <option>Patrícia</option>
          <option>Sarah</option>
          <option>Tamires</option>
          <option>Viviane</option>
        </select>

        <label for="cidade">Cidade</label>
        <select id="cidade" name="cidade" required>
          <option value="" disabled selected>Selecione a Cidade</option>
          <option>Aparecida</option>
          <option>Guaratinguetá</option>
          <option>Lorena</option>
          <option>Santo Antônio do Pinhal</option>
          <option>São Bento do Sapucaí</option>
          <option>São José dos Campos</option>
          <option>Taubaté</option>
          <option>Ubatuba</option>
        </select>

        <label for="proposta">Proposta comercial</label>
        <select id="proposta" name="proposta" required>
          <option value="" disabled selected>Proposta comercial</option>
          <option>ALFA SEGUROS</option>
          <option>ALIRO SEGUROS</option>
          <option>ALLIANZ SEGUROS</option>
          <option>AZUL SEGUROS</option>
          <option>BRADESCO SEGUROS</option>
          <option>DARWIN SEGUROS</option>
          <option>HDI SEGUROS</option>
          <option>MAPFRE SEGUROS</option>
          <option>PORTO SEGUROS</option>
          <option>SUHAI SEGUROS</option>
          <option>SURA SEGUROS</option>
          <option>TOKIO SEGUROS</option>
          <option>YELUM SEGUROS</option>
          <option>ZURICH SEGUROS</option>
        </select>

        <div class="grid-2">
          <div>
            <label for="segurado">Nome do segurado</label>
            <input id="segurado" name="segurado" type="text" placeholder="Nome do segurado" required />
          </div>
          <div>
            <label for="condutor2">Condutor Principal (opcional)</label>
            <input id="condutor2" name="condutor2" type="text" placeholder="Condutor Principal (opcional)" />
          </div>
        </div>

        <div class="grid-3">
          <div>
            <label for="modelo">Modelo do veículo</label>
            <input id="modelo" name="modelo" type="text" placeholder="Modelo do veículo" required />
          </div>
          <div>
            <label for="ano">Ano</label>
            <input id="ano" name="ano" type="text" maxlength="4" placeholder="Ano" required />
          </div>
          <div>
            <label for="placa">Placa</label>
            <input id="placa" name="placa" type="text" maxlength="7" placeholder="Placa" required />
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="franquia">Franquia</label>
          <input id="franquia" name="franquia" type="text" placeholder="R$ 0,00" required />

          <label for="valorTotal">Valor Total</label>
          <input id="valorTotal" name="valorTotal" type="text" placeholder="R$ 0,00" required />

          <label for="formaPagamento">Forma de pagamento</label>
          <select id="formaPagamento" name="formaPagamento" required>
            <option value="" disabled selected>Selecione</option>
            <option value="credito">Cartão de Crédito</option>
            <option value="debito">Cartão de Débito</option>
            <option value="boleto">Boleto</option>
            <option value="pix">Pix</option>
          </select>

          <div id="parcelasContainer" style="display:none;margin-top:8px;">
            <label for="parcelas">Parcelas</label>
            <select id="parcelas" name="parcelas">
              <option value="" disabled selected>Selecione parcelas</option>
              <option>1x</option><option>2x</option><option>3x</option><option>4x</option>
              <option>5x</option><option>6x</option><option>7x</option><option>8x</option>
              <option>9x</option><option>10x</option><option>11x</option><option>12x</option>
            </select>
          </div>

          <label for="validadeOrcamento">Validade do orçamento</label>
          <input id="validadeOrcamento" name="validadeOrcamento" type="date" required />
        </div>

        <div style="margin-top:12px;">
          <label for="coberturaSelect">Coberturas</label>
          <select id="coberturaSelect">
            <option value="" disabled selected>Escolha uma cobertura</option>                    
            <option value="Perda Total">Perda Total</option>     
            <option value="Roubo/Furto">Roubo/Furto</option>
            <option value="Compreensiva">Compreensiva</option>
            <option value="RCFV">RCFV</option>
            <option value="Acidentes pessoais morte/invalidez">Acidentes pessoais morte/invalidez</option>
            <option value="Custo de Defesa">Custo de Defesa</option>
            <option value="Danos Corporais">Danos Corporais</option>
            <option value="Danos Materiais">Danos Materiais</option>
            <option value="Danos Morais">Danos Morais</option>
            <option value="Despesa Extraordinária">Despesa Extraordinária</option>
            <option value="Percentual Tabela FIPE">FIPE</option>
            <option value="Carro Reserva">Carro Reserva</option>
            
          </select>

          <div class="badges" id="coberturasSelecionadas">
            <div id="simplesContainer"></div>
            <div id="complexasContainer"></div>
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="assistenciaSelect">Assistências</label>
          <select id="assistenciaSelect">
            <option value="" disabled selected>Escolha uma assistência</option>
          <option value="Martelinho de ouro">Martelinho de ouro</option>
          <option value="Parachoque/Pintura">Parachoque/Pintura</option>
          <option value="Pequenos Reparos">Pequenos Reparos</option>
          </select>

          <div class="badges" id="assistenciasSelecionadas">
            <div id="simplesAssistenciasContainer"></div>
            <div id="complexasAssistenciasContainer"></div>
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="vidrosSelect">Assistência de Vidros</label>
          <select id="vidrosSelect">
            <option value="" disabled selected>Escolha uma opção</option>
            <option value="Farol">Farol</option>
            <option value="Lanterna">Lanterna</option>
            <option value="Vidro Lateral">Vidro Lateral</option>
            <option value="Para-brisa">Para-brisa</option>          
            <option value="Farol Auxiliar">Farol Auxiliar</option>
            <option value="Vidro Traseiro">Vidro Traseiro</option>
            <option value="Teto Solar">Teto Solar</option>
            <option value="Retrovisor Interno">Retrovisor Interno</option>
            <option value="Retrovisor Externo">Retrovisor Externo</option>        
          </select>
          <div id="vidrosSelecionados"></div>
        </div>

        <div style="margin-top:12px;">
          <label>Assistência 24h</label>
          <div id="assistencia24hContainer"></div>
        </div>

        <div style="margin-top:12px;">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" name="observacoes" placeholder="Observações (opcional)"></textarea>
        </div>

        <div class="actions">
          <button type="button" class="primary" id="btnEnviar">Enviar</button>
          <button type="button" class="ghost" id="btnReset">Preencher novamente</button>
        </div>
      </form>
    </div>
  </div>

  <div class="overlay" id="successOverlay" aria-hidden="true">
    <div class="card">
      <h2>Enviado com sucesso ✅</h2>
      <p class="small">Os dados foram enviados com sucesso.</p>
      <div style="margin-top:12px;">
        <button class="primary" id="overlayClose">Fechar</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="loadingOverlay" aria-hidden="true">
    <div class="card" style="text-align:center;">
      <div class="spinner"></div>
      <h2>Gerando seu contrato...</h2>
      <p class="small">Aguarde enquanto o documento está sendo preparado</p>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const bg = $('#bg');
    const themeToggle = $('#themeToggle');
    const vendedor = $('#vendedor');
    const cidade = $('#cidade');
    const proposta = $('#proposta');
    const segurado = $('#segurado');
    const condutor2 = $('#condutor2');
    const modelo = $('#modelo');
    const ano = $('#ano');
    const placa = $('#placa');
    const franquia = $('#franquia');
    const valorTotal = $('#valorTotal');
    const formaPagamento = $('#formaPagamento');
    const parcelas = $('#parcelas');
    const parcelasContainer = $('#parcelasContainer');
    const validadeOrcamento = $('#validadeOrcamento');
    const coberturaSelect = $('#coberturaSelect');
    const simplesContainer = $('#simplesContainer');
    const complexasContainer = $('#complexasContainer');
    const assistenciaSelect = $('#assistenciaSelect');
    const simplesAssistenciasContainer = $('#simplesAssistenciasContainer');
    const complexasAssistenciasContainer = $('#complexasAssistenciasContainer');
    const vidrosSelect = $('#vidrosSelect');
    const vidrosSelecionados = $('#vidrosSelecionados');
    const assistencia24hContainer = $('#assistencia24hContainer');
    const observacoes = $('#observacoes');
    const btnEnviar = $('#btnEnviar');
    const btnReset = $('#btnReset');
    const successOverlay = $('#successOverlay');
    const overlayClose = $('#overlayClose');
    const loadingOverlay = $('#loadingOverlay');

    const state = {
      coberturasEscolhidas: new Set(),
      assistenciasEscolhidas: new Set(),
      vidrosEscolhidos: new Set()
    };

    const originalOptions = {
      cobertura: [],
      assistencia: [],
      vidros: [],
      servicos24h: []
    };

    function createBadge(text, key){
      const span = document.createElement('span');
      span.className = 'badge';
      span.textContent = text + ' ✖';
      if(key) span.dataset.valor = key;
      return span;
    }
    function formatBRLFromDigits(digits){
      if(!digits) return '';
      const n = Number(digits) / 100;
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    (function init(){
      if(coberturaSelect){
        originalOptions.cobertura = Array.from(coberturaSelect.querySelectorAll('option')).map((o,i)=>({value:o.value, text:o.text, index:i, disabled:o.disabled}));
      }
      if(assistenciaSelect){
        originalOptions.assistencia = Array.from(assistenciaSelect.querySelectorAll('option')).map((o,i)=>({value:o.value, text:o.text, index:i, disabled:o.disabled}));
      }
      if(vidrosSelect){
        originalOptions.vidros = Array.from(vidrosSelect.querySelectorAll('option')).map((o,i)=>({value:o.value, text:o.text, index:i, disabled:o.disabled}));
      }

      originalOptions.servicos24h = [
        {value:'Guincho', text:'Guincho', index:1},
        {value:'Troca de Pneus', text:'Troca de Pneus', index:2},
        {value:'Pane Seca', text:'Pane Seca', index:3},
        {value:'Chaveiro', text:'Chaveiro', index:4},
        {value:'Taxi', text:'Taxi', index:5}
      ];

      const savedTheme = localStorage.getItem('eco_theme');
      if(savedTheme === 'dark' || savedTheme === 'light'){
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }

      const currentTheme = document.documentElement.getAttribute('data-theme');
      if(currentTheme === 'dark'){
        themeToggle.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
      } else {
        themeToggle.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
      }

      const hoje = new Date().toISOString().split('T')[0];
      validadeOrcamento.setAttribute('min', hoje);

      segurado.addEventListener('input', e => {
         let valor = e.target.value;

         valor = valor.replace(/[0-9]/g, '');     
         valor = valor.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');

  e.target.value = valor.toUpperCase();
});

 condutor2.addEventListener('input', e => {
         let valor = e.target.value;

         valor = valor.replace(/[0-9]/g, '');     
         valor = valor.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');

  
  e.target.value = valor.toUpperCase();
});

      placa.addEventListener('input', e => e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,7), {passive:true});
      ano.addEventListener('input', e => e.target.value = e.target.value.replace(/[^0-9]/g,'').slice(0,4), {passive:true});
      franquia.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'');
        e.target.value = v ? formatBRLFromDigits(v) : '';
      }, {passive:false});

      valorTotal.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g,'');
        e.target.value = v ? formatBRLFromDigits(v) : '';
      }, {passive:false});

      formaPagamento.addEventListener('change', () => {
        if(formaPagamento.value === 'credito') {
          parcelasContainer.style.display = 'block';
        }
        else { 
          parcelasContainer.style.display = 'none'; 
          if(parcelas) parcelas.value = ''; 
          const parcelasValoresContainer = document.getElementById('parcelasValoresContainer');
          if(parcelasValoresContainer) parcelasValoresContainer.remove();
        }
      }, {passive:true});

      parcelas.addEventListener('change', () => {
        buildParcelasInputs();
      }, {passive:true});

      ['vendedor','cidade','proposta','segurado','modelo','ano','placa','franquia','valorTotal','formaPagamento','validadeOrcamento'].forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;
        el.addEventListener('input', () => { el.style.border=''; el.style.boxShadow=''; }, {passive:true});
      });
      if(parcelas) parcelas.addEventListener('change', () => { parcelas.style.border=''; parcelas.style.boxShadow=''; }, {passive:true});

      buildAssistencia24h();
      initBlobs();
      themeToggle.addEventListener('click', toggleTheme);
    })();

    function buildParcelasInputs(){
      const numParcelas = parseInt(parcelas.value) || 0;

    function removeOptionFromSelect(selectEl, value){
      if(!selectEl || !value) return;
      const opt = Array.from(selectEl.options).find(o => o.value === value);
      if(opt) opt.remove();
    }
    
    function addOptionToSelect(selectEl, value, originalList){
      if(!selectEl || !value || !originalList) return;
      if(Array.from(selectEl.options).some(o => o.value === value)) return;
      const meta = originalList.find(o => o.value === value);
      if(!meta) return;
      const newOpt = document.createElement('option');
      newOpt.value = meta.value;
      newOpt.text = meta.text;
      if(meta.disabled) newOpt.disabled = true;
      const insertIndex = Math.min(meta.index, selectEl.options.length);
      if(insertIndex >= selectEl.options.length) selectEl.appendChild(newOpt);
      else selectEl.insertBefore(newOpt, selectEl.options[insertIndex]);
    }

    function validarObrigatorios(){
  const obrigatorios = [vendedor,cidade,proposta,segurado,modelo,ano,placa,franquia,valorTotal,formaPagamento,validadeOrcamento];

  for(const el of obrigatorios){
    if(!el || !el.value){
      el.style.border = '2px solid #e11d48';
      el.style.boxShadow = '0 0 0 3px rgba(225,29,72,0.12)';
      el.focus();
      return false;
    }
  }

  if(formaPagamento.value === 'credito'){
    if(!parcelas || !parcelas.value){
      parcelas.style.border = '2px solid #e11d48';
      parcelas.style.boxShadow = '0 0 0 3px rgba(225,29,72,0.12)';
      parcelas.focus();
      return false;
    }

    const valorParcela = document.querySelector('#parcelaValorUnico');

    if(!valorParcela){
      alert('Selecione as parcelas');
      return false;
    }

    const somenteNumeros = valorParcela.value.replace(/\D/g, '');

    if(somenteNumeros.length === 0){
      valorParcela.style.border = '2px solid #e11d48';
      valorParcela.style.boxShadow = '0 0 0 3px rgba(225,29,72,0.12)';
      valorParcela.focus();
      valorParcela.style.border = '2px solid #e11d48';
      valorParcela.style.boxShadow = '0 0 0 3px rgba(225,29,72,0.12)';
      valorParcela.focus();
      return false;
    }
  }

  return true;
}


    function brlToNumber(brlString){
      if(!brlString) return null;
      const cleaned = String(brlString).replace(/\s/g,'').replace('R$','').replace(/\./g,'').replace(',','.');
      const n = Number(cleaned);
      return isNaN(n) ? null : n;
    }

    function buildCoberturasPayload({ numericValues = true } = {}){ 
      const items = [];
      const wrappers = document.querySelectorAll('.cobertura-item');
      wrappers.forEach(w => {
        const nome = w.dataset.valor;
        if(!nome) return;
        const obj = { nome };
        const inputValor = w.querySelector(`input[data-cobertura="${nome}"]`);
        if(inputValor && inputValor.value){
          obj.valor = numericValues ? brlToNumber(inputValor.value) : inputValor.value;
        }
        const selectTipo = w.querySelector('select');
        if(selectTipo && selectTipo.value) obj.tipo = selectTipo.value;
        const inputDias = w.querySelector('input[type="number"]');
        if(inputDias && inputDias.value) {
          if(nome === 'Percentual Tabela FIPE') {
            obj.percentual = inputDias.value;
          } else {
            obj.dias = inputDias.value;
          }
        }
        const extras = w.querySelectorAll('[data-extra-key]');
        extras.forEach(el => {
          const key = el.dataset.extraKey;
          if(!key) return;
          obj[key] = el.value;
        });
        items.push(obj);
      });
      return items;
    }

    function buildAssistenciasPayload(){
      const items = [];
      const wrappers = document.querySelectorAll('.assistencia-item');
      wrappers.forEach(w => {
        const nome = w.dataset.valor;
        if(!nome) return;
        const obj = { nome };
        const checkboxes = w.querySelectorAll('input[type="checkbox"]');
        if(checkboxes && checkboxes.length){
          obj.itens = [];
          checkboxes.forEach(cb => {
            if(cb.checked) obj.itens.push(cb.value);
          });
        }
        const selects = w.querySelectorAll('select');
        selects.forEach((s, i) => { if(s.value) obj[`select_${i}`] = s.value; });
        const inputs = w.querySelectorAll('input[type="text"], input[type="number"]');
        inputs.forEach((inp, i) => { if(inp.value) obj[`input_${i}`] = inp.value; });
        items.push(obj);
      });
      return items;
    }

    function buildVidrosPayload(){
      const arr = [];
      const badges = document.querySelectorAll('#vidrosSelecionados .badge');
      badges.forEach(b => {
        const nome = b.dataset.valor || b.textContent.replace(' ✖','').trim();
        arr.push(nome);
      });
      return arr;
    }

    function buildAssistencia24hPayload(){
      const container = assistencia24hContainer.querySelector('[data-cobertura="Assistencia 24h"]');
      if(!container || container.state24h.servicos.size === 0) return null;
      
      const servicos = [];
      container.state24h.servicos.forEach((dados, nomeServico) => {
        servicos.push({
          nome: nomeServico,
          nivel: dados.nivel,
          distancia: dados.distancia,
          tipo: dados.tipo,
          dias: dados.dias
        });
      });
      
      return servicos.length > 0 ? { servicos: servicos } : null;
    }

    function initBlobs(){
      if(!bg) return;
      const isTouch = window.matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
      const smallScreen = window.innerWidth < 720;
      if(isTouch || smallScreen) return;

      const COUNT = 50;
      const MIN_SIZE = 50;
      const MAX_SIZE = 200;
      const BASE_ALPHA = 0.08;
      const REPULSE_RADIUS = 460;
      const REPULSE_FORCE = 1.9;
      const RETURN_SPRING = 0.06;
      const FRICTION = 0.88;
      const WANDER = 0.25;

      const blobs = [];

      const rectInit = bg.getBoundingClientRect();
      for(let i=0;i<COUNT;i++){
        const el = document.createElement('div');
        el.className = 'blob';
        const size = Math.round(MIN_SIZE + Math.random()*(MAX_SIZE - MIN_SIZE));
        el.style.width = size + 'px';
        el.style.height = size + 'px';

        const leftPct = Math.random();
        const topPct = Math.random();
        el.style.left = '0px';
        el.style.top = '0px';
        const alpha = BASE_ALPHA + Math.random()*0.6;
        el.style.background = `rgba(31,122,58,${alpha})`;
        el.style.filter = `blur(${2 + Math.random()*10}px)`;
        bg.appendChild(el);

        const x = rectInit.left + leftPct * rectInit.width;
        const y = rectInit.top + topPct * rectInit.height;

        blobs.push({
          el,
          size,
          x,
          y,
          ox: x,
          oy: y,
          oxPct: leftPct,
          oyPct: topPct,
          vx: (Math.random()-0.5) * 0.2,
          vy: (Math.random()-0.5) * 0.2,
          phase: Math.random() * Math.PI * 2
        });
      }

      const mouse = { x: null, y: null, inside: false };

      function onMouseMove(e){
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      }
      function onMouseEnter(e){
        mouse.inside = true;
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      }
      function onMouseLeave(){
        mouse.inside = false;
        mouse.x = null;
        mouse.y = null;
      }

      document.addEventListener('mousemove', onMouseMove, {passive:true});
      document.addEventListener('mouseenter', onMouseEnter, {passive:true});
      document.addEventListener('mouseleave', onMouseLeave, {passive:true});

      let lastTime = performance.now();
      function animate(now){
        const dt = Math.min(40, now - lastTime) / 16.666;
        lastTime = now;

        const rect = bg.getBoundingClientRect();

        for(let i=0;i<blobs.length;i++){
          const b = blobs[i];

          b.phase += 0.002 * dt * (0.5 + Math.random()*1.5);
          const wanderX = Math.cos(b.phase) * WANDER * (i%3 + 1);
          const wanderY = Math.sin(b.phase) * WANDER * (i%2 + 1);

          const dxToOrigin = b.ox - b.x;
          const dyToOrigin = b.oy - b.y;
          b.vx += dxToOrigin * RETURN_SPRING * 0.5 * dt;
          b.vy += dyToOrigin * RETURN_SPRING * 0.5 * dt;

          b.vx += wanderX * 0.2 * dt;
          b.vy += wanderY * 0.2 * dt;

          if(mouse.inside && mouse.x !== null && mouse.y !== null){
            const dx = b.x - mouse.x;
            const dy = b.y - mouse.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < REPULSE_RADIUS){
              const force = (1 - (dist / REPULSE_RADIUS)) * REPULSE_FORCE;
              const nx = dx / (dist || 1);
              const ny = dy / (dist || 1);
              b.vx += nx * force * (1 + Math.random()*0.4) * dt;
              b.vy += ny * force * (1 + Math.random()*0.4) * dt;
            }
          }

          b.vx *= FRICTION;
          b.vy *= FRICTION;

          b.x += b.vx * dt;
          b.y += b.vy * dt;

          const margin = 60;
          b.x = Math.max(rect.left - margin, Math.min(rect.right + margin, b.x));
          b.y = Math.max(rect.top - margin, Math.min(rect.bottom + margin, b.y));

          b.el.style.transform = `translate3d(${b.x - b.size/2}px, ${b.y - b.size/2}px, 0)`;
        }

        requestAnimationFrame(animate);
      }

      function placeInitial(){
        const rect = bg.getBoundingClientRect();
        blobs.forEach(b => {
          b.ox = rect.left + b.oxPct * rect.width;
          b.oy = rect.top + b.oyPct * rect.height;
          b.x = b.ox;
          b.y = b.oy;
          b.el.style.position = 'absolute';
          b.el.style.left = '0px';
          b.el.style.top = '0px';
          b.el.style.transform = `translate3d(${b.x - b.size/2}px, ${b.y - b.size/2}px, 0)`;
        });
      }

      let resizeTimer = null;
      function onResize(){
        const rect = bg.getBoundingClientRect();
        blobs.forEach(b => {
          b.ox = rect.left + b.oxPct * rect.width;
          b.oy = rect.top + b.oyPct * rect.height;
        });
        placeInitial();
      }
      window.addEventListener('resize', () => {
        if(resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(onResize, 120);
      });

      let lastDPR = window.devicePixelRatio;
      setInterval(() => {
        const dpr = window.devicePixelRatio;
        if(dpr !== lastDPR){
          lastDPR = dpr;
          onResize();
        }
      }, 300);

      window.addEventListener('wheel', (e) => {
        if(e.ctrlKey){
          if(resizeTimer) clearTimeout(resizeTimer);
          resizeTimer = setTimeout(onResize, 80);
        }
      }, {passive:true});

      window.addEventListener('gesturechange', () => {
        if(resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(onResize, 80);
      });

      window.addEventListener('scroll', () => {
        if(resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(onResize, 80);
      }, {passive:true});

      placeInitial();
      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
