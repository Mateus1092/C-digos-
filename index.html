<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário ECO</title>

<style>
:root {
	--color-primary: #1f7a3a;
	--color-background: #f6f8f7;
	--color-card-bg: #ffffff;
	--color-card-border: #e5e7eb;
	--color-text: #1f2937;
	--color-input-border: #d1d5db;

	--radius: 14px;
	--shadow: 0 15px 35px rgba(0,0,0,0.08);
}

[data-theme="dark"] {
	--color-background: #0b1210;
	--color-card-bg: #0f1a15;
	--color-card-border: #1f2a24;
	--color-text: #ecfdf5;
	--color-input-border: #2d3a34;
}

/* FUNDO */
.background {
	position: fixed;
	inset: 0;
	background: var(--color-background);
	z-index: -1;
	overflow: hidden;
}

/* BLOBS */
.blob {
	position: absolute;
	width: 35px;
	height: 35px;
	background: rgba(31, 122, 58, 0.9);
	border-radius: 50%;
	filter: blur(2px);
	transition: transform 0.2s ease;
	pointer-events: none;
}

/* BASE */
body {
	font-family: Inter, sans-serif;
	display: flex;
	justify-content: center;
	padding: 60px 16px;
	color: var(--color-text);
}

/* CARD */
.card {
	backdrop-filter: blur(14px);
	background: rgba(255,255,255,0.85);
	border: 1px solid var(--color-card-border);
	border-radius: var(--radius);
	padding: 32px;
	width: 100%;
	max-width: 520px;
	box-shadow: var(--shadow);
	position: relative;
}

[data-theme="dark"] .card {
	background: rgba(15, 26, 21, 0.85);
}

/* LOGO */
.logo {
	max-width: 180px;
	display: block;
	margin: 0 auto 20px;
}

/* SELECT */
select {
	width: 100%;
	padding: 14px;
	margin-top: 12px;
	border-radius: 10px;
	border: 1px solid var(--color-input-border);
	background: transparent;
	color: var(--color-text);
}

select option {
	color: #000;
}

[data-theme="dark"] select option {
	color: #fff;
	background: #0f1a15;
}

/* BUTTON */
button {
	width: 100%;
	height: 46px;
	border-radius: 10px;
	border: none;
	cursor: pointer;
	font-weight: 600;
	margin-top: 20px;
}

.next {
	background: var(--color-primary);
	color: white;
}

/* TOGGLE (BOLINHA) */
.theme-toggle {
	position: absolute;
	top: 16px;
	right: 16px;
	width: 36px;
	height: 36px;
	background: transparent;
	border: 1px solid var(--color-card-border);
	border-radius: 50%;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 0;
}

[data-theme="dark"] .theme-toggle {
	background: rgba(255, 255, 255, 0.05);
	color: #facc15;
	border: 1px solid rgba(255, 255, 255, 0.1);
}

.theme-toggle svg {
	width: 16px;
	height: 16px;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="card">
	<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"></button>

	<img src="https://i.imgur.com/O8Bayp2.png" class="logo" />

	<h3>Selecionar vendedor</h3>

	<select id="vendedor">
		<option value="" disabled selected>Selecione</option>
		<option value="Inaia">Inaiá</option>
		<option value="Nicolas">Nicolas</option>
		<option value="Patricia">Patrícia</option>
	</select>

	<button class="next" onclick="enviarFormulario()">Enviar</button>
</div>

<script>
const moonIcon = `<svg viewBox="0 0 24 24" fill="none">
<path d="M21 12.79A9 9 0 0 1 11.21 3 
7 7 0 1 0 21 12.79Z"
stroke="currentColor" stroke-width="2"/>
</svg>`;

const sunIcon = `<svg viewBox="0 0 24 24" fill="none">
<circle cx="12" cy="12" r="5" stroke="#facc15" stroke-width="2"/>
<line x1="12" y1="1" x2="12" y2="3" stroke="#facc15" stroke-width="2"/>
<line x1="12" y1="21" x2="12" y2="23" stroke="#facc15" stroke-width="2"/>
<line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="#facc15" stroke-width="2"/>
<line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="#facc15" stroke-width="2"/>
<line x1="1" y1="12" x2="3" y2="12" stroke="#facc15" stroke-width="2"/>
<line x1="21" y1="12" x2="23" y2="12" stroke="#facc15" stroke-width="2"/>
<line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="#facc15" stroke-width="2"/>
<line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="#facc15" stroke-width="2"/>
</svg>`;

function toggleTheme() {
	const current = document.documentElement.getAttribute("data-theme");
	const newTheme = current === "dark" ? "light" : "dark";
	document.documentElement.setAttribute("data-theme", newTheme);
	localStorage.setItem("theme", newTheme);
	updateIcon();
}

function updateIcon() {
	const theme = document.documentElement.getAttribute("data-theme");
	document.getElementById("themeBtn").innerHTML =
		theme === "dark" ? sunIcon : moonIcon;
}

(function () {
	const saved = localStorage.getItem("theme") || "light";
	document.documentElement.setAttribute("data-theme", saved);
	updateIcon();
})();

/* BLOBS */
const bg = document.getElementById("bg");
for (let i = 0; i < 200; i++) {
	const blob = document.createElement("div");
	blob.className = "blob";
	blob.style.top = Math.random() * 100 + "%";
	blob.style.left = Math.random() * 100 + "%";
	bg.appendChild(blob);

	document.addEventListener("mousemove", (e) => {
		const dx = blob.offsetLeft - e.clientX;
		const dy = blob.offsetTop - e.clientY;
		const dist = Math.sqrt(dx*dx + dy*dy);

		if (dist < 180) {
			blob.style.transform = `translate(${dx * 0.3}px, ${dy * 0.3}px)`;
		} else {
			blob.style.transform = `translate(0,0)`;
		}
	});
}

/* ENVIO N8N */
async function enviarFormulario() {
	const vendedor = document.getElementById("vendedor").value;

	if (!vendedor) {
		alert("Selecione um vendedor");
		return;
	}

	await fetch("https://projeto1-n8n.khyklu.easypanel.host/webhook-test/db0338f3-a387-4a7a-8981-c17c540ed3ea", {
		method: "POST",
		headers: { "Content-Type": "application/json" },
		body: JSON.stringify({ vendedor })
	});

	alert("Enviado com sucesso!");
}
</script>

</body>
</html>
